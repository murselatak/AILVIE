<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#00b4d8">
  <meta name="description" content="AILVIE — AI Personal Health Assistant. 60+ languages, medication tracking, voice assistant, drug recognition, health score, patient card. KVKK/GDPR compliant.">
  <meta name="keywords" content="health assistant, AI, medication tracker, drug interaction, patient card, voice assistant, multilingual, KVKK, GDPR">
  <meta property="og:title" content="AILVIE — AI Personal Health Assistant">
  <meta property="og:description" content="60+ languages • Medication tracking • Voice assistant • Drug recognition • Patient card">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ailvie.pages.dev/">
  <meta name="robots" content="noindex, nofollow">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AILVIE">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>AILVIE</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body,#root{height:100%;height:100dvh}
    body{overflow:hidden;font-family:-apple-system,system-ui,sans-serif;background:#0a0e14}
    input,textarea,select{-webkit-user-select:auto;user-select:auto;font-family:inherit}
    /* Visible focus indicator (WCAG 2.4.7). Only for keyboard users, not mouse clicks. */
    :focus-visible{outline:3px solid #00b4d8;outline-offset:2px;border-radius:6px}
    @media (prefers-color-scheme: light){:focus-visible{outline-color:#0077b6}}
  </style>
</head>
<body>
  <div id="root">
    <!-- First paint before the JS bundle parses. React replaces this on mount. -->
    <div id="boot" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#0b1117;color:#e8a817;font-family:system-ui,-apple-system,sans-serif">
      <div style="font:700 34px/1 Rajdhani,system-ui,sans-serif;letter-spacing:1px;-webkit-text-stroke:0.8px #e8a817">AILVIE</div>
      <div style="width:34px;height:34px;border:3px solid rgba(232,168,23,.25);border-top-color:#e8a817;border-radius:50%;animation:bspin .8s linear infinite"></div>
      <div style="color:#93a4b6;font-size:13px">Yükleniyor…</div>
    </div>
  </div>
  <style>@keyframes bspin{to{transform:rotate(360deg)}}
    @media (prefers-color-scheme: light){#boot{background:#f7fafc!important}}
  </style>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
